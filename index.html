<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>くくコレ！プリンセス</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sparkles" class="sparkles" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar">
      <button id="homeButton" class="icon-button" type="button" aria-label="タイトルへ">🏰</button>
      <div>
        <p class="eyebrow">くくを たのしく おぼえよう</p>
        <h1>くくコレ！プリンセス</h1>
      </div>
      <div class="admin-controls">
        <button id="dressupButton" class="dressup-top-button" type="button">きせかえ</button>
        <button id="resetButton" class="reset-button" type="button">リセット</button>
        <button id="adminButton" class="admin-button" type="button">管理者</button>
      </div>
      <button id="closetButton" class="icon-button" type="button" aria-label="クローゼット">👗</button>
    </header>

    <main id="app" class="screen" aria-live="polite"></main>
  </div>

  <template id="treasureTemplate">
    <div class="modal-backdrop">
      <section class="treasure-modal" role="dialog" aria-modal="true" aria-labelledby="treasureTitle">
        <div class="treasure-art"></div>
        <h2 id="treasureTitle">たからばこ オープン！</h2>
        <p id="treasureText"></p>
        <button id="treasureClose" class="primary-button" type="button">やったね</button>
      </section>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
